<!-- (CÓDIGO COMPLETO COM EFEITO DE GELO) -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Os Contos de Aldoryn - Wiki</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<link rel="preload" href="mouse_acima.mp3" as="audio">
<link rel="preload" href="char_aparece.mp3" as="audio">
<link rel="preload" href="clique_acima.mp3" as="audio">

<style>

body {
  margin: 0;
  font-family: 'Cinzel', serif;
  background: radial-gradient(circle at center, #1a1a1a, #0d0d0d);
  color: #e6d3a3;
}

.container {
  display: flex;
  gap: 30px;
  padding: 30px;
  min-height: 100vh;
}

.left {
  flex: 1;
  position: relative;
  border: 3px solid #c9a44c;
  border-radius: 22px;
  overflow: hidden;
  background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)), url('fundo.png') center/cover no-repeat;
}

/* ❄️ EFEITO GELO MID */
.left img.mid {
  position: absolute;
  left: -30px;
  bottom: 0;
  height: 104%;
  animation: entrarMid 1.2s ease-out both, geloPulse 3s ease-in-out infinite;
  filter:
    drop-shadow(0 0 6px rgba(180, 230, 255, 0.8))
    drop-shadow(0 0 14px rgba(120, 200, 255, 0.6))
    drop-shadow(0 0 24px rgba(80, 160, 255, 0.4));
}

/* ❄️ EFEITO GELO CHAR */
.left img.char {
  position: absolute;
  right: 10px;
  bottom: 0;
  height: 95%;
  animation: entrarChar 1.2s ease-out both, geloPulse 3s ease-in-out infinite;
  filter:
    drop-shadow(0 0 8px rgba(180, 230, 255, 0.9))
    drop-shadow(0 0 18px rgba(120, 200, 255, 0.7))
    drop-shadow(0 0 30px rgba(80, 160, 255, 0.5));
}

.right {
  width: 420px;
  border: 3px solid #c9a44c;
  border-radius: 22px;
  padding: 28px;
  background: linear-gradient(145deg, #111, #1c1c1c);
}

.title {
  text-align: center;
  font-size: 36px;
  margin-bottom: 25px;
}

/* Botões */
.info {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.row {
  display: flex;
  gap: 10px;
}

.label {
  width: 150px;
  border: 2px solid #c9a44c;
  padding: 10px;
  text-align: center;
  background: #111;
}

.value {
  width: 220px;
}

.value a {
  display: block;
  border: 2px solid #c9a44c;
  padding: 10px;
  text-align: center;
  text-decoration: none;
  color: #e6d3a3;
}

.value a:hover {
  background: #c9a44c;
  color: #111;
}

/* ❄️ ANIMAÇÃO GELO */
@keyframes geloPulse {
  0% {
    filter:
      drop-shadow(0 0 6px rgba(180, 230, 255, 0.7))
      drop-shadow(0 0 12px rgba(120, 200, 255, 0.5))
      drop-shadow(0 0 20px rgba(80, 160, 255, 0.3));
  }
  50% {
    filter:
      drop-shadow(0 0 14px rgba(200, 240, 255, 1))
      drop-shadow(0 0 28px rgba(140, 210, 255, 0.9))
      drop-shadow(0 0 50px rgba(100, 180, 255, 0.7));
  }
  100% {
    filter:
      drop-shadow(0 0 6px rgba(180, 230, 255, 0.7))
      drop-shadow(0 0 12px rgba(120, 200, 255, 0.5))
      drop-shadow(0 0 20px rgba(80, 160, 255, 0.3));
  }
}

/* ENTRADA */
@keyframes entrarMid {
  from { transform: translateX(220px); opacity:0; }
  to { transform: translateX(0); opacity:1; }
}

@keyframes entrarChar {
  from { transform: translateX(-220px); opacity:0; }
  to { transform: translateX(0); opacity:1; }
}

/* BOTÃO INVISÍVEL AUDIO */
#audio-activation-overlay {
  position: fixed;
  inset: 0;
  z-index: 999999;
  background: transparent;
}

</style>
</head>

<body>

<div class="container">
  <div class="left">
    <img class="mid" src="ragardo_mid.png">
    <img class="char" src="ragardo_png.png">
  </div>

  <div class="right">
    <div class="title">RAGARDO</div>

    <div class="info">
      <div class="row"><div class="label">Raça</div><div class="value"><a href="#">Míscere-Dragão</a></div></div>
      <div class="row"><div class="label">Elemento</div><div class="value"><a href="#">Glacial</a></div></div>
      <div class="row"><div class="label">Arma</div><div class="value"><a href="#">Dragonslasher</a></div></div>
    </div>
  </div>
</div>

<button id="audio-activation-overlay"></button>

<audio id="audio-char" src="char_aparece.mp3"></audio>
<audio id="audio-hover" src="mouse_acima.mp3"></audio>
<audio id="audio-click" src="clique_acima.mp3"></audio>

<script>
const overlay = document.getElementById("audio-activation-overlay");
const audioChar = document.getElementById("audio-char");
const audioHover = document.getElementById("audio-hover");
const audioClick = document.getElementById("audio-click");

let ativado = false;

function ativarAudio(){
  if(ativado) return;
  ativado = true;
  audioChar.volume = 0.7;
  audioChar.play().catch(()=>{});
  overlay.remove();
}

overlay.addEventListener("pointermove", ativarAudio, {once:true});
overlay.addEventListener("click", ativarAudio, {once:true});
overlay.addEventListener("touchstart", ativarAudio, {once:true});

document.querySelectorAll("a").forEach(link=>{
  link.addEventListener("mouseenter", ()=>{
    if(ativado){
      new Audio("mouse_acima.mp3").play();
    }
  });

  link.addEventListener("click", ()=>{
    if(ativado){
      new Audio("clique_acima.mp3").play();
    }
  });
});
</script>

</body>
</html>
