<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki RPG</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: radial-gradient(circle at center, #1a1a1a, #0d0d0d);
      color: #e6d3a3;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 30px;
      gap: 30px;
    }

    .left {
      flex: 1;
      border: 3px solid #c9a44c;
      border-radius: 22px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(201,164,76,0.3);
      background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)),
                  url('fundo.png') center/cover no-repeat;
    }

    .left img {
      position: relative;
      z-index: 3;
      object-fit: contain;
    }

    .left img.mid {
      position: absolute;
      left: 0;
      bottom: 0;
      max-height: 90%;
      max-width: 60%;
      z-index: 2;
      -webkit-mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
      mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
    }

    .left img.char {
      position: relative;
      right: 10px;
      max-height: 95%;
      max-width: 50%;
      z-index: 4;
      -webkit-mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
      mask-image: radial-gradient(circle at center, black 65%, transparent 100%);
      filter: drop-shadow(0 0 18px rgba(0,0,0,0.9));
    }

    .right {
      width: 420px;
      border: 3px solid #c9a44c;
      border-radius: 10px;
      padding: 20px;
      background: linear-gradient(145deg, #111, #1c1c1c);
      box-shadow: 0 0 20px rgba(201,164,76,0.3);
    }

    .title {
      text-align: center;
      font-size: 36px;
      margin-bottom: 25px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(201,164,76,0.7);
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .label {
      width: 40%;
      min-width: 150px;
      max-width: 150px;
      border: 2px solid #c9a44c;
      padding: 10px;
      background: #111;
      text-align: center;
      box-sizing: border-box;
    }

    .label.vazio {
      visibility: hidden;
    }

    .value {
      width: 60%;
      min-width: 220px;
      max-width: 220px;
    }

    .value a {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
      border: 2px solid #c9a44c;
      padding: 10px;
      color: #e6d3a3;
      background: linear-gradient(145deg, #1a1a1a, #111);
      text-align: center;
      transition: 0.25s;
      box-sizing: border-box;
    }

    .value a:hover {
      background: #c9a44c;
      color: #111;
      box-shadow: 0 0 10px #c9a44c;
      transform: scale(1.03);
    }

      .left-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: transparent;
    }

    .left-effects {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 30%, rgba(160,220,255,0.22) 0%, rgba(160,220,255,0.08) 18%, transparent 38%),
        radial-gradient(circle at 30% 70%, rgba(255,170,90,0.18) 0%, rgba(255,170,90,0.07) 16%, transparent 34%),
        radial-gradient(circle at 78% 22%, rgba(210,235,255,0.15) 0%, rgba(210,235,255,0.05) 12%, transparent 28%),
        radial-gradient(circle at center, transparent 56%, rgba(0,0,0,0.42) 100%);
      animation: auraPulse 5s ease-in-out infinite alternate;
    }

    .left::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(230,245,255,0.9) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(190,225,255,0.7) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,205,150,0.55) 0 1px, transparent 1.8px);
      background-size: 140px 140px, 110px 110px, 170px 170px;
      background-position: 10% 20%, 35% 65%, 80% 35%;
      opacity: 0.55;
      animation: particlesFloat 12s linear infinite;
    }

    @keyframes auraPulse {
      from {
        transform: scale(1);
        opacity: 0.9;
      }
      to {
        transform: scale(1.03);
        opacity: 1;
      }
    }

    @keyframes particlesFloat {
      from {
        transform: translateY(0px) translateX(0px);
      }
      50% {
        transform: translateY(-8px) translateX(6px);
      }
      to {
        transform: translateY(-16px) translateX(-4px);
      }
    }

</style>
</head>
<body>

  <div class="container">

    <!-- ESQUERDA -->
    <div class="left">
      <div class="left-bg"></div>
      <img class="mid" src="ragardo_mid.png" alt="Arte">
      <img class="char" src="ragardo_png.png" alt="Personagem">
    </div>
      <div class="left-effects"></div>
      <img src="ragardo.png" alt="Personagem">
    </div>

    <!-- DIREITA -->
    <div class="right">
      <div class="title">RAGARDO</div>

      <div class="info">

        <div class="row">
          <div class="label">Nacionalidade</div>
          <div class="value"><a href="nacionalidade.html">Montes Wesland</a></div>
        </div>

        <div class="row">
          <div class="label">Cidade</div>
          <div class="value"><a href="cidade.html">Reginforte</a></div>
        </div>

        <div class="row">
          <div class="label">Raça</div>
          <div class="value"><a href="raca.html">Míscere-Dragão</a></div>
        </div>

        <div class="row">
          <div class="label">Elemental</div>
          <div class="value"><a href="elemento.html">Glacial</a></div>
        </div>

        <div class="row">
          <div class="label">Ocupação</div>
          <div class="value"><a href="ocupacao.html">General Ordem & Equilíbrio</a></div>
        </div>
        
        <div class="row">
          <div class="label vazio"></div>
          <div class="value"><a href="ocup_guardareal.html">General da Guarda Real</a></div>
        </div>

        <div class="row">
          <div class="label">Arma</div>
          <div class="value"><a href="arma.html">Dragonslasher</a></div>
        </div>

        <div class="row">
          <div class="label">Relíquia</div>
          <div class="value"><a href="reliquia.html">Safira de Iglis</a></div>
        </div>

        <div class="row">
          <div class="label">Dom</div>
          <div class="value"><a href="dom.html">Mutação do Kaiser</a></div>
        </div>

        <div class="row">
          <div class="label">Maldição</div>
          <div class="value"><a href="maldicao.html">N/A</a></div>
        </div>

        <div class="row">
          <div class="label">Espírito Guardião</div>
          <div class="value"><a href="espirito.html">N/A</a></div>
        </div>

        <div class="row">
          <div class="label">Explosão</div>
          <div class="value"><a href="explosao.html">Sequência do Kaiser</a></div>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
