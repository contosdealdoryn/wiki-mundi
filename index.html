<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki RPG</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: radial-gradient(circle at center, #1a1a1a, #0d0d0d);
      color: #e6d3a3;
    }

    .container {
      display: flex;
      height: 100vh;
      padding: 30px;
      gap: 30px;
    }

    .left {
      flex: 1;
      border: 3px solid #c9a44c;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('fundo.png') center/cover no-repeat;
      box-shadow: 0 0 20px rgba(201,164,76,0.3);
      position: relative;
    }

    .left img {
      max-height: 95%;
      max-width: 95%;
      z-index: 2;
      filter: drop-shadow(0 0 15px rgba(0,0,0,0.9));
    }

    .right {
      width: 420px;
      border: 3px solid #c9a44c;
      border-radius: 10px;
      padding: 20px;
      background: linear-gradient(145deg, #111, #1c1c1c);
      box-shadow: 0 0 20px rgba(201,164,76,0.3);
    }

    .title {
      text-align: center;
      font-size: 36px;
      margin-bottom: 25px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(201,164,76,0.7);
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .label {
      width: 40%;
      min-width: 150px;
      max-width: 150px;
      border: 2px solid #c9a44c;
      padding: 10px;
      background: #111;
      text-align: center;
      box-sizing: border-box;
    }

    .value {
      width: 60%;
      min-width: 250px;
      max-width: 250px;
    }

    .value a {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
      border: 2px solid #c9a44c;
      padding: 10px;
      color: #e6d3a3;
      background: linear-gradient(145deg, #1a1a1a, #111);
      text-align: center;
      transition: 0.25s;
      box-sizing: border-box;
    }

    .value a:hover {
      background: #c9a44c;
      color: #111;
      box-shadow: 0 0 10px #c9a44c;
      transform: scale(1.03);
    }

  </style>
</head>
<body>

  <div class="container">

    <!-- ESQUERDA -->
    <div class="left">
      <img src="ragardo.png" alt="Personagem">
    </div>

    <!-- DIREITA -->
    <div class="right">
      <div class="title">RAGARDO</div>

      <div class="info">

        <div class="row">
          <div class="label">Nacionalidade</div>
          <div class="value"><a href="nacionalidade.html">Montes Wesland</a></div>
        </div>

        <div class="row">
          <div class="label">Cidade</div>
          <div class="value"><a href="cidade.html">Reginforte</a></div>
        </div>

        <div class="row">
          <div class="label">Raça</div>
          <div class="value"><a href="raca.html">Míscere-Dragão</a></div>
        </div>

        <div class="row">
          <div class="label">Elemental</div>
          <div class="value"><a href="elemento.html">Glacial</a></div>
        </div>

        <div class="row">
          <div class="label">Ocupação</div>
          <div class="value"><a href="ocupacao.html">General da Ordem & Equilíbrio<br>General da Guarda Real</a></div>
        </div>

        <div class="row">
          <div class="label">Arma</div>
          <div class="value"><a href="arma.html">Dragonslasher</a></div>
        </div>

        <div class="row">
          <div class="label">Relíquia</div>
          <div class="value"><a href="reliquia.html">Safira de Iglis</a></div>
        </div>

        <div class="row">
          <div class="label">Dom</div>
          <div class="value"><a href="dom.html">Mutação do Kaiser</a></div>
        </div>

        <div class="row">
          <div class="label">Maldição</div>
          <div class="value"><a href="maldicao.html">N/A</a></div>
        </div>

        <div class="row">
          <div class="label">Espírito Guardião</div>
          <div class="value"><a href="espirito.html">N/A</a></div>
        </div>

        <div class="row">
          <div class="label">Explosão</div>
          <div class="value"><a href="explosao.html">Sequência do Kaiser</a></div>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
