<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aldoryn</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: radial-gradient(circle at center, #1a1a1a, #0b0b0d);
      color: #e6d3a3;
      text-align: center;
    }

    /* LOGO */
    .logo {
      margin-top: 40px;
    }

    .logo img {
      width: 300px;
      max-width: 90%;
    }

    /* BOTÃO MÚSICA */
    .btn-musica {
      margin-top: 20px;
      padding: 14px 24px;
      border: 2px solid #c9a44c;
      background: linear-gradient(145deg, #1a1a1a, #111);
      color: #e6d3a3;
      font-size: 16px;
      cursor: pointer;
      border-radius: 12px;
      transition: 0.3s;
    }

    .btn-musica:hover {
      background: #c9a44c;
      color: #111;
      box-shadow: 0 0 10px #c9a44c;
    }

    /* MENU */
    .menu {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .menu button {
      padding: 10px 14px;
      border: 2px solid #c9a44c;
      background: #111;
      color: #e6d3a3;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.2s;
    }

    .menu button:hover {
      background: #c9a44c;
      color: #111;
    }

    .submenu {
      display: none;
      margin-top: 10px;
    }

    .submenu a {
      display: block;
      margin: 5px 0;
      color: #e6d3a3;
      text-decoration: none;
      border: 1px solid #c9a44c;
      padding: 8px;
      border-radius: 8px;
      background: #111;
    }

    .submenu a:hover {
      background: #c9a44c;
      color: #111;
    }
  </style>
</head>

<body>

  <!-- LOGO SOLTO -->
  <div class="logo">
    <img src="logo_aldoryn.png" alt="Aldoryn">
  </div>

  <!-- BOTÃO DE MÚSICA -->
  <button class="btn-musica" onclick="tocarMusica()">
    Seja bem vindo ao fantástico mundo mágico de Aldoryn...
  </button>

  <!-- ÁUDIO -->
  <audio id="bgm" src="aldoryn_bgm.mp3" loop></audio>

  <!-- MENU PRINCIPAL -->
  <div class="menu">

    <button onclick="toggleMenu('personagens')">Personagens</button>
    <button onclick="toggleMenu('mapa')">Mapa</button>
    <button onclick="toggleMenu('bestiario')">Bestiário</button>
    <button onclick="toggleMenu('racas')">Raças</button>
    <button onclick="toggleMenu('magia')">Magícias & Técnicas</button>
    <button onclick="toggleMenu('equip')">Equipamentos & Runas</button>

  </div>

  <!-- SUBMENUS -->

  <div id="personagens" class="submenu">
    <a href="moriana.html">Moriana</a>
    <a href="nyta.html">Nyta</a>
    <a href="ragardo.html">Ragardo</a>
    <a href="nerferiryn.html">Nerferiryn</a>
    <a href="calisthia.html">Calisthia</a>
  </div>

  <div id="mapa" class="submenu">
    <a href="#">Países Livres</a>
    <a href="#">Montes Wesland</a>
    <a href="#">Shaj Igrari</a>
  </div>

  <div id="bestiario" class="submenu">
    <a href="#">Goblin Venenoso</a>
    <a href="#">Goblin Batedor</a>
  </div>

  <div id="racas" class="submenu">
    <a href="#">Humanos</a>
    <a href="#">Mísceres</a>
    <a href="#">Elfos</a>
    <a href="#">Vividias</a>
  </div>

  <div id="magia" class="submenu">
    <a href="#">Glacial</a>
    <a href="#">Flama</a>
    <a href="#">Nebulosa</a>
  </div>

  <div id="equip" class="submenu">
    <a href="#">Espadas</a>
    <a href="#">Armaduras</a>
    <a href="#">Escudos</a>
  </div>

  <script>
    function tocarMusica() {
      const audio = document.getElementById("bgm");
      audio.volume = 0.6;
      audio.play();
    }

    function toggleMenu(id) {
      const menus = document.querySelectorAll(".submenu");
      menus.forEach(m => {
        if (m.id !== id) m.style.display = "none";
      });

      const el = document.getElementById(id);
      el.style.display = (el.style.display === "block") ? "none" : "block";
    }
  </script>

</body>
</html>
