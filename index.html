<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Os Contos de Aldoryn - Wiki</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cinzel', serif;
  background: radial-gradient(circle at center, #1a1a1a, #0b0b0d);
  color: #e6d3a3;
  text-align: center;
}

/* LOGO */
.logo {
  margin-top: 40px;
}

.logo img {
  width: 320px;
  max-width: 90%;
}

/* BOTÃO MÚSICA */
.btn-musica {
  margin-top: 20px;
  padding: 14px 24px;
  border: 2px solid #c9a44c;
  background: linear-gradient(145deg, #1a1a1a, #111);
  color: #e6d3a3;
  font-size: 16px;
  cursor: pointer;
  border-radius: 12px;
  transition: 0.3s;
}

.btn-musica:hover {
  background: #c9a44c;
  color: #111;
  box-shadow: 0 0 10px #c9a44c;
}

/* MENU */
.menu {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
}

.menu button {
  padding: 10px 14px;
  border: 2px solid #c9a44c;
  background: #111;
  color: #e6d3a3;
  cursor: pointer;
  border-radius: 10px;
  transition: 0.2s;
}

.menu button:hover {
  background: #c9a44c;
  color: #111;
}

/* SUBMENU */
.submenu {
  display: none;
  margin-top: 10px;
}

.submenu a {
  display: block;
  margin: 5px auto;
  width: 220px;
  color: #e6d3a3;
  text-decoration: none;
  border: 1px solid #c9a44c;
  padding: 8px;
  border-radius: 8px;
  background: #111;
  transition: 0.2s;
}

.submenu a:hover {
  background: #c9a44c;
  color: #111;
}
</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="banner_principal.png" alt="Aldoryn">
</div>

<!-- BOTÃO MÚSICA -->
<button class="btn-musica">
  (CLIQUE AQUI) Seja bem vindo ao fantástico mundo mágico de Aldoryn...
</button>

<!-- ÁUDIO PRINCIPAL -->
<audio id="bgm" src="aldoryn_bgm.mp3" loop></audio>

<!-- ÁUDIOS DE EFEITO -->
<audio id="audio-hover" src="mouse_acima.mp3"></audio>
<audio id="audio-click" src="clique_acima.mp3"></audio>

<!-- MENU -->
<div class="menu">
  <button onclick="toggleMenu('personagens')">Personagens</button>
  <button onclick="toggleMenu('mapa')">Mapa</button>
  <button onclick="toggleMenu('bestiario')">Bestiário</button>
  <button onclick="toggleMenu('racas')">Raças</button>
  <button onclick="toggleMenu('magia')">Magícias & Técnicas</button>
  <button onclick="toggleMenu('equip')">Equipamentos & Runas</button>
</div>

<!-- SUBMENUS -->
<div id="personagens" class="submenu">
  <a href="ragardo.html">Ragardo</a>
  <a href="#">Moriana</a>
  <a href="#">Nyta</a>
</div>

<div id="mapa" class="submenu">
  <a href="#">Montes Wesland</a>
</div>

<div id="bestiario" class="submenu">
  <a href="#">Goblin Venenoso</a>
</div>

<div id="racas" class="submenu">
  <a href="#">Humanos</a>
</div>

<div id="magia" class="submenu">
  <a href="#">Glacial</a>
</div>

<div id="equip" class="submenu">
  <a href="#">Espadas</a>
</div>

<script>
const bgm = document.getElementById("bgm");
const btnMusica = document.querySelector(".btn-musica");

const audioHover = document.getElementById("audio-hover");
const audioClick = document.getElementById("audio-click");

let audioLiberado = false;

/* FUNÇÃO TOCAR */
function tocar(audio, volume=1){
  try{
    audio.pause();
    audio.currentTime = 0;
    audio.volume = volume;
    audio.play();
  }catch(e){}
}

/* BOTÃO MÚSICA */
btnMusica.addEventListener("click", ()=>{
  audioLiberado = true;
  bgm.volume = 0.6;
  bgm.play();
  tocar(audioClick, 0.5);
});

/* MENU */
function toggleMenu(id){
  const menus = document.querySelectorAll(".submenu");
  menus.forEach(m => {
    if(m.id !== id) m.style.display = "none";
  });

  const el = document.getElementById(id);
  el.style.display = (el.style.display === "block") ? "none" : "block";

  tocar(audioClick, 0.5);
}

/* HOVER + CLICK GLOBAL */
document.querySelectorAll("button, a").forEach(el=>{
  el.addEventListener("mouseenter", ()=>{
    if(audioLiberado){
      tocar(audioHover, 0.3);
    }
  });

  el.addEventListener("click", ()=>{
    if(audioLiberado){
      tocar(audioClick, 0.5);
    }
  });
});
</script>

</body>
</html>
