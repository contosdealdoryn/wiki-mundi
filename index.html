<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Os Contos de Aldoryn - Wiki</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: radial-gradient(circle at center, #1a1a1a, #0d0d0d);
      color: #e6d3a3;
    }

    .container {
      display: flex;
      align-items: stretch;
      gap: 30px;
      padding: 30px;
      box-sizing: border-box;
      min-height: 100vh;
    }

    .left {
      flex: 1;
      min-width: 0;
      position: relative;
      overflow: hidden;
      border: 3px solid #c9a44c;
      border-radius: 22px;
      box-shadow: 0 0 20px rgba(201,164,76,0.3);
      background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.55)), url('fundo.png') center/cover no-repeat;
    }

    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      box-shadow: inset 0 0 22px rgba(0,0,0,0.28), inset 0 0 38px rgba(255,255,255,0.03);
    }

    .left img.mid {
      position: absolute;
      left: -30px;
      bottom: 0;
      height: 104%;
      width: auto;
      z-index: 2;
      object-fit: contain;
      image-rendering: auto;
      transform: translateZ(0);
      filter: drop-shadow(0 0 12px rgba(0,0,0,0.75));
      animation: entrarMid 1.2s ease-out both;
    }

    .left img.char {
      position: absolute;
      right: 10px;
      bottom: 0;
      height: 95%;
      width: auto;
      z-index: 4;
      object-fit: contain;
      image-rendering: auto;
      transform: translateZ(0);
      filter: drop-shadow(0 0 18px rgba(0,0,0,0.9));
      animation: entrarChar 1.2s ease-out both;
    }

    .left-effects {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 30%, rgba(160,220,255,0.18) 0%, rgba(160,220,255,0.06) 18%, transparent 38%),
        radial-gradient(circle at 30% 70%, rgba(255,170,90,0.12) 0%, rgba(255,170,90,0.04) 16%, transparent 34%),
        radial-gradient(circle at center, transparent 58%, rgba(0,0,0,0.35) 100%);
      animation: auraPulse 5s ease-in-out infinite alternate;
    }

    .left::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(230,245,255,0.75) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(190,225,255,0.5) 0 1px, transparent 1.6px);
      background-size: 140px 140px, 110px 110px;
      background-position: 10% 20%, 35% 65%;
      opacity: 0.45;
      animation: particlesFloat 12s linear infinite;
    }

    .right {
      flex: 0 0 420px;
      width: 420px;
      position: relative;
      border: 3px solid #c9a44c;
      border-radius: 22px;
      padding: 28px;
      background: linear-gradient(145deg, #111, #1c1c1c);
      box-shadow: 0 0 20px rgba(201,164,76,0.3);
      box-sizing: border-box;
    }

    .title {
      text-align: center;
      font-size: 45px;
      margin-bottom: 25px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(201,164,76,0.7);
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      align-items: center; /* centraliza no desktop */
    }

    .row {
      display: flex;
      gap: 10px;
      width: auto; /* não ocupa tudo, permite centralizar */
      justify-content: center;
    }

    .label {
      width: 150px;
      min-width: 150px;
      max-width: 150px;
      border: 2px solid #c9a44c;
      padding: 10px;
      background: #111;
      text-align: center;
      box-sizing: border-box;
    }

    .label.vazio {
      visibility: hidden;
    }

    .value {
      width: 220px;
      min-width: 220px;
      max-width: 220px;
    }

    .value a {
      display: block;
      width: 100%;
      text-decoration: none;
      border: 2px solid #c9a44c;
      padding: 10px;
      color: #e6d3a3;
      background: linear-gradient(145deg, #1a1a1a, #111);
      text-align: center;
      transition: 0.25s;
      box-sizing: border-box;
    }

    .value a:hover {
      background: #c9a44c;
      color: #111;
      box-shadow: 0 0 10px #c9a44c;
      transform: scale(1.03);
    }

    @keyframes entrarMid {
      from {
        transform: translateX(220px) translateZ(0);
        opacity: 0;
      }
      to {
        transform: translateX(0) translateZ(0);
        opacity: 1;
      }
    }

    @keyframes entrarChar {
      from {
        transform: translateX(-220px) translateZ(0);
        opacity: 0;
      }
      to {
        transform: translateX(0) translateZ(0);
        opacity: 1;
      }
    }

    @keyframes auraPulse {
      from {
        transform: scale(1);
        opacity: 0.9;
      }
      to {
        transform: scale(1.02);
        opacity: 1;
      }
    }

    @keyframes particlesFloat {
      from {
        transform: translateY(0px) translateX(0px);
      }
      50% {
        transform: translateY(-8px) translateX(6px);
      }
      to {
        transform: translateY(-16px) translateX(-4px);
      }
    }

    @media (max-width: 768px) {
      .info {
        align-items: stretch;
      }

      .row {
        width: 100%;
        justify-content: flex-start;
      }

      .container {
        flex-direction: column;
        align-items: center;
        padding: 18px;
        gap: 18px;
      }

      .left {
        width: 100%;
        height: 380px;
        min-height: 380px;
      }

      .right {
        width: 100%;
        max-width: 100%;
        padding: 36px 20px 42px;
        border-radius: 30px;
      }

      .title {
        font-size: 28px;
        margin-bottom: 18px;
      }

      .info {
        gap: 8px;
      }

      .row {
        gap: 8px;
      }

      .label {
        width: calc(42% - 4px);
        min-width: 0;
        max-width: none;
        padding: 10px 6px;
        font-size: 11px;
      }

      .value {
        width: calc(58% - 4px);
        min-width: 0;
        max-width: none;
      }

      .value a {
        padding: 10px 6px;
        font-size: 11px;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      .left img.mid {
        left: -70px;
        height: 106%;
      }

      .left img.char {
        right: -8px;
        height: 98%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <img class="mid" src="ragardo_mid.png" alt="Arte complementar">
      <div class="left-effects"></div>
      <img class="char" src="ragardo_png.png" alt="Ragardo">
    </div>

    <div class="right">
      <div class="title">RAGARDO</div>

      <div class="info">
        <div class="row">
          <div class="label">Nacionalidade</div>
          <div class="value"><a href="nacionalidade.html">Montes Wesland</a></div>
        </div>

        <div class="row">
          <div class="label">Cidade</div>
          <div class="value"><a href="cidade.html">Reginforte</a></div>
        </div>

        <div class="row">
          <div class="label">Raça</div>
          <div class="value"><a href="raca.html">Míscere-Dragão</a></div>
        </div>

        <div class="row">
          <div class="label">Elemental</div>
          <div class="value"><a href="elemento.html">Glacial</a></div>
        </div>

        <div class="row">
          <div class="label">Ocupação</div>
          <div class="value"><a href="ocupacao.html">General Ordem &amp; Equilíbrio</a></div>
        </div>

        <div class="row">
          <div class="label vazio"></div>
          <div class="value"><a href="ocup_guardareal.html">General da Guarda Real</a></div>
        </div>

        <div class="row">
          <div class="label">Arma</div>
          <div class="value"><a href="arma.html">Dragonslasher</a></div>
        </div>

        <div class="row">
          <div class="label">Relíquia</div>
          <div class="value"><a href="reliquia.html">Safira de Iglis</a></div>
        </div>

        <div class="row">
          <div class="label">Dom</div>
          <div class="value"><a href="dom.html">Mutação do Kaiser</a></div>
        </div>

        <div class="row">
          <div class="label">Maldição</div>
          <div class="value"><a href="maldicao.html">N/A</a></div>
        </div>

        <div class="row">
          <div class="label">Espírito Guardião</div>
          <div class="value"><a href="espirito.html">N/A</a></div>
        </div>

        <div class="row">
          <div class="label">Explosão</div>
          <div class="value"><a href="explosao.html">Sequência do Kaiser</a></div>
        </div>
      </div>
    </div>
  </div>
    <audio id="somHover" src="mouse_acima.mp3" preload="auto"></audio>
  <audio id="somEntrada" src="char_aparece.mp3" preload="auto"></audio>
  <audio id="somClique" src="clique_acima.mp3" preload="auto"></audio>

  <script>
    const links = document.querySelectorAll('a');
    const somHover = document.getElementById('somHover');
    const somEntrada = document.getElementById('somEntrada');
    const somClique = document.getElementById('somClique');

    let audioLiberado = false;
    let entradaTocada = false;

    function tocar(audio, volume = 1) {
      if (!audio) return;
      try {
        audio.pause();
        audio.currentTime = 0;
        audio.volume = volume;
        const promessa = audio.play();
        if (promessa && typeof promessa.catch === 'function') {
          promessa.catch(() => {});
        }
      } catch (e) {}
    }

    function tocarEntrada() {
      if (entradaTocada) return;
      entradaTocada = true;
      tocar(somEntrada, 0.7);
    }

    function liberarAudio() {
      if (!audioLiberado) {
        audioLiberado = true;
      }
      tocarEntrada();
    }

    window.addEventListener('load', () => {
      setTimeout(() => {
        tocarEntrada();
      }, 180);
    });

    document.addEventListener('pointerdown', liberarAudio, { once: true });
    document.addEventListener('touchstart', liberarAudio, { once: true, passive: true });
    document.addEventListener('mousemove', liberarAudio, { once: true });
    document.addEventListener('keydown', liberarAudio, { once: true });

    links.forEach(link => {
      link.addEventListener('mouseenter', () => {
        if (audioLiberado) {
          tocar(somHover, 0.35);
        }
      });

      link.addEventListener('pointerdown', () => {
        tocar(somClique, 0.55);
      });

      link.addEventListener('touchstart', () => {
        tocar(somClique, 0.55);
      }, { passive: true });
    });
  </script>
</body>
</html>
