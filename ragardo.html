<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ragardo</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cinzel', serif;
      background: radial-gradient(circle at center, #1a1a1a, #0d0d0d);
      color: #cfeeff;
    }

    .container {
      display: flex;
      gap: 30px;
      padding: 30px;
      min-height: 100vh;
    }

    .left {
      flex: 1;
      position: relative;
      border: 3px solid #7fd1ff;
      border-radius: 22px;
      overflow: hidden;
      background: url('fundo.png') center/cover no-repeat;
      box-shadow: 0 0 20px rgba(127, 209, 255, 0.25);
    }

    .left img {
      position: absolute;
      bottom: 0;
      cursor: pointer;
      transition: 0.25s;
    }

    .mid {
      left: -30px;
      height: 104%;
      z-index: 2;
    }

    .char {
      right: 10px;
      height: 95%;
      z-index: 4;
    }

    .front {
      z-index: 6 !important;
      transform: scale(1.02);
    }

    .back {
      z-index: 2 !important;
      opacity: 0.85;
    }

    .right {
      width: 420px;
      border: 3px solid #7fd1ff;
      border-radius: 22px;
      padding: 28px;
      background: linear-gradient(145deg, #111, #1c1c1c);
      box-shadow: 0 0 20px rgba(127, 209, 255, 0.25);
    }

    .title {
      text-align: center;
      font-size: 32px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(127, 209, 255, 0.35);
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }

    .label {
      width: 150px;
      border: 2px solid #7fd1ff;
      padding: 10px;
      background: #111;
      text-align: center;
    }

    .value {
      flex: 1;
    }

    .value a {
      display: block;
      text-decoration: none;
      border: 2px solid #7fd1ff;
      padding: 10px;
      text-align: center;
      color: #cfeeff;
      background: #111;
      transition: 0.25s;
    }

    .value a:hover {
      background: #7fd1ff;
      color: #111;
    }

    #audio-activation-overlay {
      position: fixed;
      inset: 0;
      z-index: 999999;
      background: transparent;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="left">
    <img id="ragardoMid" class="mid" src="ragardo_mid.png">
    <img id="ragardoChar" class="char" src="ragardo_png.png">
  </div>

  <div class="right">
    <div class="title">RAGARDO</div>

    <div class="row">
      <div class="label">Nacionalidade</div>
      <div class="value"><a href="#">Montes Wesland</a></div>
    </div>

    <div class="row">
      <div class="label">Cidade</div>
      <div class="value"><a href="#">Reginforte</a></div>
    </div>

    <div class="row">
      <div class="label">Raça</div>
      <div class="value"><a href="#">Míscere-Dragão</a></div>
    </div>
  </div>
</div>

<div id="audio-activation-overlay"></div>

<audio id="audio-char" src="char_aparece.mp3"></audio>
<audio id="audio-hover" src="mouse_acima.mp3"></audio>
<audio id="audio-click" src="clique_acima.mp3"></audio>

<script>
(() => {
  const overlay = document.getElementById("audio-activation-overlay");
  const audioChar = document.getElementById("audio-char");
  const audioHover = document.getElementById("audio-hover");
  const audioClick = document.getElementById("audio-click");

  const ragardoMid = document.getElementById("ragardoMid");
  const ragardoChar = document.getElementById("ragardoChar");

  let audioAtivado = false;

  function play(audio, vol=1){
    audio.pause();
    audio.currentTime = 0;
    audio.volume = vol;
    audio.play().catch(()=>{});
  }

  function ativarAudio(){
    if(audioAtivado) return;
    audioAtivado = true;
    overlay.remove();
  }

  overlay.addEventListener("click", ativarAudio);
  overlay.addEventListener("touchstart", ativarAudio);

  function trazerMid(){
    ragardoMid.classList.add("front");
    ragardoMid.classList.remove("back");

    ragardoChar.classList.add("back");
    ragardoChar.classList.remove("front");
  }

  function trazerChar(){
    ragardoChar.classList.add("front");
    ragardoChar.classList.remove("back");

    ragardoMid.classList.add("back");
    ragardoMid.classList.remove("front");
  }

  trazerChar();

  ragardoChar.onclick = (e)=>{
    e.stopPropagation();
    if(audioAtivado) play(audioChar,0.7);
    trazerMid();
  }

  ragardoMid.onclick = (e)=>{
    e.stopPropagation();
    if(audioAtivado) play(audioChar,0.7);
    trazerChar();
  }

})();
</script>

</body>
</html>
